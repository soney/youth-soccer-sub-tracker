<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#176b4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sub Tracker">
    <title>Youth Soccer Sub Tracker</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Match Day</p>
          <h1>Sub Tracker</h1>
        </div>
        <span class="save-pill" id="saveStatus">Saved</span>
      </header>

      <main>
        <section class="timer-panel" aria-label="Game timer">
          <div class="clock-row">
            <div>
              <span class="label">Game Clock</span>
              <strong class="game-clock" id="gameClock">00:00</strong>
            </div>
            <button class="primary-action" id="startStopButton" type="button">Start</button>
          </div>

          <div class="lineup-toolbar">
            <div class="stepper" aria-label="Players on field">
              <button class="icon-button" id="decreaseLimit" type="button" aria-label="Decrease players on field">-</button>
              <div class="stepper-value">
                <span class="label">On Field</span>
                <strong id="playerLimit">7</strong>
              </div>
              <button class="icon-button" id="increaseLimit" type="button" aria-label="Increase players on field">+</button>
            </div>
            <div class="field-count" id="fieldCount">0 of 7</div>
          </div>

          <div class="sub-timer" id="subTimerPanel" aria-label="Substitution timer">
            <div class="sub-clock-wrap">
              <span class="label">Next Sub</span>
              <strong class="sub-clock" id="nextSubClock">05:00</strong>
              <span class="sub-status" id="subStatus">Every 5 min</span>
            </div>
            <div class="sub-controls">
              <div class="stepper compact-stepper" aria-label="Sub interval">
                <button class="icon-button" id="decreaseSubInterval" type="button" aria-label="Decrease sub interval">-</button>
                <div class="stepper-value">
                  <span class="label">Interval</span>
                  <strong id="subInterval">5m</strong>
                </div>
                <button class="icon-button" id="increaseSubInterval" type="button" aria-label="Increase sub interval">+</button>
              </div>
              <button class="secondary-action" id="subDoneButton" type="button">Sub Done</button>
            </div>
            <div class="sound-controls">
              <button class="secondary-action sound-toggle" id="soundAlertButton" type="button" aria-pressed="true">Sound On</button>
              <button class="secondary-action" id="testSoundButton" type="button">Test Sound</button>
            </div>
          </div>

          <div class="timer-actions">
            <button class="secondary-action" id="resetTimesButton" type="button">Reset Times</button>
            <button class="secondary-action" id="benchAllButton" type="button">Bench All</button>
          </div>
        </section>

        <nav class="tabs" aria-label="Tracker views">
          <button class="tab is-active" type="button" data-view="field" aria-controls="fieldView">Field</button>
          <button class="tab" type="button" data-view="roster" aria-controls="rosterView">Roster</button>
        </nav>

        <section class="view" id="fieldView">
          <div class="section-heading">
            <h2>Lineup</h2>
            <span id="keeperName">No keeper</span>
          </div>
          <div class="notice" id="lineupNotice" hidden></div>
          <div class="player-list" id="playerList"></div>
          <div class="empty-state" id="fieldEmptyState">
            <strong>No players yet</strong>
            <button class="link-button" type="button" data-view-switch="roster">Add Roster</button>
          </div>
        </section>

        <section class="view" id="rosterView" hidden>
          <form class="player-form" id="playerForm" autocomplete="off">
            <input type="hidden" id="playerId">
            <label>
              <span>Name</span>
              <input id="playerName" name="name" type="text" required maxlength="40" placeholder="Player name">
            </label>
            <label>
              <span>Number</span>
              <input id="playerNumber" name="number" type="text" inputmode="numeric" maxlength="3" placeholder="12">
            </label>
            <div class="form-actions">
              <button class="primary-action" id="savePlayerButton" type="submit">Add Player</button>
              <button class="secondary-action" id="cancelEditButton" type="button" hidden>Cancel</button>
            </div>
          </form>

          <details class="bulk-import">
            <summary>Paste List</summary>
            <textarea id="bulkNames" rows="6" placeholder="Mia 8&#10;Ava #12&#10;Liam"></textarea>
            <button class="secondary-action" id="importBulkButton" type="button">Import</button>
          </details>

          <div class="roster-list" id="rosterList"></div>

          <button class="danger-action" id="clearRosterButton" type="button">Clear Roster</button>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
